name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  broker-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: broker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile broker tests
        run: mvn -q test-compile

  sidecar-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - name: Install sidecar dependencies
        run: npm ci
      - name: Check sidecar runtime syntax
        run: npm run check:syntax

  deployment-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Validate Helm templates
        run: bash scripts/check-helm-templates.sh
      - name: Validate Docker Compose config
        run: bash scripts/check-compose-config.sh
