broker:
  image:
    repository: ghcr.io/nextend/broker-platform-broker
    tag: 1.0.0-alpha.1
  service:
    h3Port: 7171
    managementPort: 6933
  env:
    jwtIssuer: nextend-broker
    h3Path: /rsocket
    webtransportPath: /broker/wt
    sidecarMode: companion
    sidecarAdminUrl: http://127.0.0.1:9090

sidecar:
  image:
    repository: ghcr.io/nextend/broker-platform-sidecar
    tag: 1.0.0-alpha.1
  service:
    webtransportPort: 7443
    adminPort: 9090
  env:
    contractVersion: "1"

secrets:
  jwtSigningKey: replace-with-hex-signing-key
  tlsCertPath: /certs/tls.crt
  tlsKeyPath: /certs/tls.key

resources:
  broker:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 1Gi
    limits:
      memory: 1Gi
  sidecar:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 512Mi
    limits:
      memory: 512Mi
